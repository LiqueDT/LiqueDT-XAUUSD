name: Deploy LiqueDT to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-pages.txt
      - name: Install resilient market data client
        run: python -m pip install --disable-pip-version-check -r requirements-pages.txt
      - name: Restore last successful public snapshots
        uses: actions/cache@v4
        with:
          path: data
          key: liquedt-data-${{ github.run_id }}
          restore-keys: |
            liquedt-data-
      - name: Refresh public market snapshots
        run: python tools/build_static_data.py --output data
      - name: Build static site artifact
        run: |
          mkdir -p _site
          cp index.html styles.css app.js icon.svg favicon.ico favicon-32.png manifest.webmanifest service-worker.js app-icon-192.png app-icon-512.png apple-touch-icon.png _site/
          cp -r data _site/data
          touch _site/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
